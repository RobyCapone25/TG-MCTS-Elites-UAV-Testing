name: Documentation issue
description: Report inaccurate, incomplete, or inconsistent documentation
title: "[Docs] "
labels:
  - documentation
body:
  - type: input
    id: location
    attributes:
      label: File or section
      placeholder: docs/SETUP.md, README section, UML diagram, etc.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Explain what is inaccurate, ambiguous, outdated, or missing.
    validations:
      required: true

  - type: textarea
    id: correction
    attributes:
      label: Proposed correction
      description: Include supporting evidence when the change concerns implemented behavior.
