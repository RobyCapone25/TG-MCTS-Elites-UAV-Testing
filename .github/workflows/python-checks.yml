name: Python checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-checks:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install YAML parser
        run: python -m pip install "PyYAML==6.0"

      - name: Compile tracked Python files
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [Path("cli.py")]
          paths.extend(Path("src").rglob("*.py"))
          paths.extend(Path("tests").rglob("*.py"))

          for path in sorted(paths):
              compile(path.read_text(encoding="utf-8"), str(path), "exec")

          print(f"Compiled {len(paths)} Python files in memory.")
          PY

      - name: Check shell syntax
        run: bash -n scripts/*.sh

      - name: Parse YAML and CFF
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in [
              Path("environment.yml"),
              Path("CITATION.cff"),
              Path(".github/workflows/python-checks.yml"),
              Path(".github/ISSUE_TEMPLATE/bug_report.yml"),
              Path(".github/ISSUE_TEMPLATE/documentation.yml"),
          ]:
              with path.open("r", encoding="utf-8") as stream:
                  yaml.safe_load(stream)
              print(f"Parsed {path}")
          PY

      - name: Check required repository files
        run: |
          required=(
            README.md
            CITATION.cff
            CHANGELOG.md
            CONTRIBUTING.md
            SECURITY.md
            docs/ALGORITHM.md
            docs/OUTPUTS.md
            docs/SETUP.md
            docs/uml/class_diagram.mmd
            docs/uml/execution_flow.mmd
            docs/uml/sequence_diagram.mmd
            benchmark/README.md
            tests/test_generator_naming.py
          )

          for path in "${required[@]}"; do
            test -s "$path" || {
              echo "Missing or empty required file: $path"
              exit 1
            }
          done

      - name: Check documentation terminology
        run: |
          if grep -RInE \
            --include='*.md' \
            'successful simulations|Fresh deterministic run|random_generator\.TGMCTSElitesGenerator' \
            README.md docs src scripts case_studies benchmark
          then
            echo "Outdated documentation terminology found."
            exit 1
          fi

      - name: Check Mermaid entry directives
        run: |
          grep -qx 'classDiagram' docs/uml/class_diagram.mmd
          grep -qx 'flowchart TD' docs/uml/execution_flow.mmd
          grep -qx 'sequenceDiagram' docs/uml/sequence_diagram.mmd

      - name: Check whitespace
        run: git diff --check
